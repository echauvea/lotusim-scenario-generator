normalization_decisions:
  - candidates: [target_location_known, protected_unit_location_known]
    canonical_state: SM-ST-027
    rationale: Location knowledge is holder-relative regardless of the consuming task.

  - candidates: [target_location_unknown]
    canonical_state: SM-ST-028
    rationale: Unknown location is holder-relative and paired with location_known.

  - candidates: [protection_capability_available]
    canonical_state: SM-ST-010
    rationale: Capability availability uses one generic state keyed by ontology capability class.

  - candidates: [navigation_failed_with_destination, navigation_failed_with_route]
    canonical_state: SM-ST-013
    rationale: One state uses a typed navigation_objective union and a stable tuple shape.

  - candidates: [approach_navigation_failed, evasion_navigation_failed]
    canonical_state: SM-ST-013
    rationale: Target-relative movement reuses navigation_failed; SM-TY-010 now also admits a physical entity objective.

  - candidates: [formation, formation_pattern, formation_geometry]
    canonical_type: SM-TY-011
    rationale: A formation reference is command-defined relative geometry and is not promoted to the physical ontology.

  - candidates: [screen_plan, defense_plan, protection_disposition]
    canonical_type: SM-TY-012
    rationale: Protection geometry, sectors and evaluation criteria are carried by one command-defined plan type.

  - candidates: [protected_force, guarded_object, protected_area, decoy_protected_subject]
    canonical_type: SM-TY-013
    rationale: Protection assignments use one union type for physical entities and spatial regions.

  - candidates: [screen_assignment, guard_assignment, interposition_assignment, defense_assignment, decoy_protection_assignment]
    canonical_state: SM-ST-055
    rationale: Non-escort Protection signatures share one protector-to-subject assignment relation.

  - candidates: [decoy_deployed, deployable_deployed_at]
    canonical_state: SM-ST-064
    rationale: Physical deployment uses one relation independent of the deployable's operational purpose.
