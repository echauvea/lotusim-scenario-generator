  - id: SM-CAND-001
    symbol: area_coverage_achieved
    mission_evidence: [MC-001, MC-002, MC-003, MC-054]
    reason_deferred: Requires coverage aggregation and semantics for Search, Survey or Assess.

  - id: SM-CAND-002
    symbol: surveillance_continuity_achieved
    mission_evidence: [MC-002, MC-054]
    reason_deferred: Requires temporal aggregation beyond the current task-state model.

  - id: SM-CAND-003
    symbol: information_requirement_satisfied
    mission_evidence: [MC-003, MC-042]
    reason_deferred: Requires semantics for Assess and mission-level information requirements.

  - id: SM-CAND-004
    symbol: contact_or_assessment_reported
    mission_evidence: [MC-001, MC-002, MC-003, MC-054, MC-060, MC-063]
