# Formulations françaises des items de revue experte — campagne Escort v0.1.
# Chaque entrée est reliée par son `id` à un item généré structurellement par
# tools/validation/generate_expert_review.py depuis le Method Catalog v0.1.0.
# La génération échoue si un item doctrinal n'a pas de formulation : la
# couverture est garantie par construction, pas par relecture.
#
# Formats : vf (Vrai / Faux / Ça dépend + commentaire), choice (choix parmi
# options + commentaire), open (réponse libre).
# Le champ `expected` note la position actuelle du catalogue ; il n'apparaît
# jamais dans le questionnaire (analyse des écarts uniquement).

title: Revue experte — Méthodes d'escorte (Method Catalog v0.1.0)
campaign: escort-v0.1
scenario_intro: |
  <strong>Situation de référence.</strong> La frégate <em>Lynx</em> reçoit l'ordre d'escorter le pétrolier ravitailleur <em>Aber</em>
  depuis sa position actuelle jusqu'à un port de destination, le long d'une route de transit.
  Le modèle en cours de validation décrit deux façons de conduire cette escorte :
  la <strong>garde rapprochée</strong> (la frégate suit le pétrolier et le garde au plus près pendant tout le transit)
  et l'<strong>escorte avec écran</strong> (la frégate tient un écran de protection selon un plan défini par le commandement).
  Les questions portent sur ce que ce modèle affirme. Répondez d'après la pratique réelle : si le modèle a tort, c'est lui qu'on corrigera.

items:

  # ── Garde rapprochée (TM-023-S01-M01) — conditions de déclenchement ──────────

  - id: VQ-TM-023-S01-M01-APP-ST006
    format: vf
    theme: Conditions de déclenchement
    statement: >
      Une escorte ne peut être planifiée que si l'escorteur a reçu formellement la responsabilité
      de protéger cette unité précise (ordre d'escorte explicite). Jamais d'escorte « opportuniste »
      sans ordre.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-APP-ST105
    format: vf
    theme: Conditions de déclenchement
    statement: >
      La route du transit doit avoir été assignée par le commandement avant le début de l'escorte :
      l'escorteur ne choisit pas lui-même la route parmi les routes praticables.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-APP-ST055
    format: vf
    theme: Conditions de déclenchement
    statement: >
      Le modèle distingue deux choses : l'ordre d'escorte (qui escorte qui) et la responsabilité de
      protection (qui répond de l'intégrité de l'unité protégée). Cette distinction correspond à une
      réalité opérationnelle — les deux peuvent être portées par des acteurs différents.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-APP-ST027
    format: vf
    theme: Conditions de déclenchement
    statement: >
      L'escorte ne peut pas débuter tant que l'escorteur ne dispose pas d'une position actuelle
      exploitable de l'unité à protéger.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-APP-ST004
    format: vf
    theme: Conditions de déclenchement
    statement: >
      Avant le départ, il suffit de vérifier que la route est praticable par l'unité protégée ;
      la praticabilité par l'escorteur lui-même n'a pas besoin d'être vérifiée.
    expected: Vrai
    note_analyste: >
      Le catalogue ne vérifie SM-ST-004 que pour protected_unit. Une réponse « Faux » majoritaire
      signifierait qu'il faut ajouter la condition pour escort_actor.

  - id: VQ-TM-023-S01-M01-CAP
    format: vf
    theme: Capacités requises
    statement: >
      Pour une garde rapprochée, on exige de l'escorteur trois aptitudes : suivre une unité désignée,
      assurer une protection, tenir un poste ; et de l'unité protégée une seule : suivre une route.
      Cette liste est correcte — ni trop exigeante, ni insuffisante.
    expected: Vrai

  # ── Garde rapprochée — déroulement ───────────────────────────────────────────

  - id: VQ-TM-023-S01-M01-DEC
    format: vf
    theme: Déroulement
    statement: >
      À ce niveau de description, la garde rapprochée se réduit à trois activités menées de front :
      le pétrolier suit sa route ; la frégate suit le pétrolier ; la frégate le garde. Rien
      d'indispensable ne manque à ce niveau (la veille capteurs, les comptes rendus, etc. relèvent
      du niveau de conduite, pas de la description de la méthode).
    expected: Vrai

  - id: VQ-TM-023-S01-M01-ORD
    format: vf
    theme: Déroulement
    statement: >
      Peu importe l'ordre dans lequel la frégate établit le suivi et la garde, pourvu que les deux
      soient effectifs avant que le pétrolier ne s'ébranle sur sa route.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-SYNC
    format: vf
    theme: Déroulement
    statement: >
      Le suivi et la protection doivent rester actifs sans interruption pendant toute la durée du
      transit. Une interruption même brève (par exemple : la frégate s'écarte pour investiguer un
      contact) remet en cause l'escorte telle que décrite.
    expected: Vrai
    note_analyste: >
      Une majorité de « Ça dépend » indiquerait que la relation spans est trop rigide et qu'il
      faudra un jour modéliser les interruptions tolérées.

  # ── Garde rapprochée — succès et incidents ──────────────────────────────────

  - id: VQ-TM-023-S01-M01-COMP
    format: vf
    theme: Critère de succès
    statement: >
      L'escorte est réussie quand — et seulement quand — le pétrolier est arrivé à destination ET
      est resté intègre selon les critères de la mission. Rien d'autre n'entre dans le critère de
      succès : ni l'état de la frégate, ni le respect d'un horaire.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-FAIL-target_lost
    format: vf
    theme: Conduite sur incident
    statement: >
      Si la frégate perd la position du pétrolier en cours de transit, la réaction par défaut est
      de chercher à le réacquérir — on ne déclare pas l'escorte échouée.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-FAIL-protection_capability_lost
    format: vf
    theme: Conduite sur incident
    statement: >
      Si la frégate perd sa capacité de protection (avarie du système d'armes, par exemple),
      l'escorte est déclarée dégradée et la décision remonte à l'échelon supérieur — mais le
      transit n'est pas interrompu automatiquement.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-FAIL-route_blocked
    format: vf
    theme: Conduite sur incident
    statement: >
      Si la route devient impraticable, la réaction par défaut est de replanifier la route
      d'escorte — sans lever le dispositif de protection pendant la replanification.
    expected: Vrai

  - id: VQ-TM-023-S01-M01-NARROW
    format: vf
    theme: Périmètre
    statement: >
      Ces méthodes ne valent que pour une plateforme escortant une autre plateforme. Escorter un
      convoi ou un groupe constitué est un problème différent, qui mérite sa propre description —
      on ne doit pas l'y ramener silencieusement.
    expected: Vrai

  # ── Escorte avec écran (TM-023-S01-M02) — questions propres ──────────────────

  - id: VQ-TM-023-S01-M02-APP-ST056
    format: vf
    theme: Escorte avec écran
    statement: >
      L'escorte avec écran n'est envisageable que si un plan de protection défini par le
      commandement est disponible : l'escorteur ne conçoit pas l'écran de sa propre initiative.
    expected: Vrai

  - id: VQ-TM-023-S01-M02-CAP
    format: vf
    theme: Escorte avec écran
    statement: >
      Contrairement à la garde rapprochée, la tenue d'écran n'exige pas de l'escorteur l'aptitude
      à tenir un poste fixe (l'écran impose ses propres évolutions).
    expected: Vrai
    note_analyste: >
      Le catalogue omet StationKeepingCapability pour M02. « Faux » majoritaire = ajout requis.

  - id: VQ-TM-023-S01-M02-DEC
    format: vf
    theme: Escorte avec écran
    statement: >
      Dans l'escorte avec écran, l'activité « tenir l'écran » reste décrite globalement à ce stade
      (secteurs, barrières et postes seront détaillés plus tard). Remplacer la garde rapprochée par
      la tenue d'écran, en conservant le suivi et le transit, décrit correctement cette forme
      d'escorte.
    expected: Vrai

  - id: VQ-TM-023-S01-M02-FAIL-persistent_screen_gap
    format: vf
    theme: Escorte avec écran
    statement: >
      Si une brèche durable apparaît dans l'écran, la réaction par défaut est de reconfigurer
      l'écran — on n'interrompt pas le transit et on ne déclare pas l'échec de l'escorte.
    expected: Vrai

  # ── Niveau signature : manques et discriminants ──────────────────────────────

  - id: VQ-TC-023-S01-SIG-APPGAP
    format: open
    theme: Chasse aux manques
    statement: >
      Décrivez une situation réelle où toutes les conditions listées plus haut sont réunies, mais
      où lancer l'escorte serait quand même une erreur. (S'il n'y en a pas, écrivez « RAS ».)

  - id: VQ-TC-023-S01-SIG-ALTGAP
    format: open
    theme: Chasse aux manques
    statement: >
      Garde rapprochée et escorte avec écran : ces deux modes couvrent-ils l'essentiel des escortes
      d'une unité seule ? Citez une forme d'escorte courante qui n'entre dans aucun des deux.
      (S'il n'y en a pas, écrivez « RAS ».)

  - id: VQ-TC-023-S01-SIG-DISCRIM
    format: vf
    theme: Choix entre les deux modes
    statement: >
      Aujourd'hui, le modèle ne connaît qu'un seul critère pour préférer l'écran à la garde
      rapprochée : l'existence d'un plan de protection. C'est le bon discriminant — le vrai choix
      ne dépend ni de la menace, ni du milieu, ni du nombre d'escorteurs disponibles.
    expected: Ça dépend
    note_analyste: >
      Question volontairement provocante : les commentaires doivent faire émerger les vrais
      discriminants exigés par MDR-11 avant validation opérationnelle.

  # ── Niveau catalogue : le choix du commandant ────────────────────────────────

  - id: VQ-TC-023-S01-CHOICE-01
    scope: catalog
    category: method_choice
    targets: [TM-023-S01-M01, TM-023-S01-M02]
    format: choice
    theme: Le choix du commandant
    context: >
      Transit littoral resserré, menace principale : mines et embarcations rapides. Aucun plan de
      protection n'a été émis. Vous commandez la frégate.
    statement: Quel mode d'escorte adoptez-vous ?
    options: [Garde rapprochée, Escorte avec écran, Autre (précisez en commentaire)]
    expected: Garde rapprochée

  - id: VQ-TC-023-S01-CHOICE-02
    scope: catalog
    category: method_choice
    targets: [TM-023-S01-M01, TM-023-S01-M02]
    format: choice
    theme: Le choix du commandant
    context: >
      Transit hauturier de 48 h, menace sous-marine évaluée sérieuse, plan de protection émis par
      le commandement. Vous commandez la frégate (aptitude ASM complète).
    statement: Quel mode d'escorte adoptez-vous ?
    options: [Garde rapprochée, Escorte avec écran, Autre (précisez en commentaire)]
    expected: Escorte avec écran
