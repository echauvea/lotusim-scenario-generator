  category: applicability_gap
  targets:
  - TM-023-S01-M01
  - TM-023-S01-M02
  question:
    format: open
    theme: Chasse aux manques
    statement: 'Décrivez une situation réelle où toutes les conditions listées plus haut sont réunies,
      mais où lancer l''escorte serait quand même une erreur. (S''il n''y en a pas, écrivez « RAS ».)

      '
  status: pending
- id: VQ-TC-023-S01-SIG-ALTGAP
  scope: signature
  signature: TC-023-S01
  category: alternative_gap
  targets:
  - TM-023-S01-M01
  - TM-023-S01-M02
  question:
    format: open
    theme: Chasse aux manques
    statement: 'Garde rapprochée et escorte avec écran : ces deux modes couvrent-ils l''essentiel des
      escortes d''une unité seule ? Citez une forme d''escorte courante qui n''entre dans aucun des deux.
      (S''il n''y en a pas, écrivez « RAS ».)

      '
  status: pending
- id: VQ-TC-023-S01-SIG-DISCRIM
  scope: signature
  signature: TC-023-S01
  category: discriminant
  targets:
  - TM-023-S01-M01
  - TM-023-S01-M02
  question:
    format: vf
    theme: Choix entre les deux modes
    statement: 'Aujourd''hui, le modèle ne connaît qu''un seul critère pour préférer l''écran à la garde
      rapprochée : l''existence d''un plan de protection. C''est le bon discriminant — le vrai choix ne
      dépend ni de la menace, ni du milieu, ni du nombre d''escorteurs disponibles.

      '
    expected: Ça dépend
    note_analyste: 'Question volontairement provocante : les commentaires doivent faire émerger les vrais
      discriminants exigés par MDR-11 avant validation opérationnelle.

      '
  status: pending
