name: Ontology documentation

on:
  pull_request:
    paths:
      - "references/**"
      - "site/**"
      - "validation/expert-review/**"
      - "specification/hddl/**"
      - "tools/validation/**"
      - "tools/reporting/**"
      - ".github/workflows/ontology-pages.yml"
  push:
    branches:
      - main
    paths:
      - "references/**"
      - "site/**"
      - "validation/expert-review/**"
      - "specification/hddl/**"
      - "tools/validation/**"
      - "tools/reporting/**"
      - ".github/workflows/ontology-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ONTOLOGY_FILE: references/ontology/LOTUSim_Naval_Maritime_Ontology_v2.0-draft.ttl
  SITE_DIR: _site
  WIDOCO_IMAGE: ghcr.io/dgarijo/widoco:v1.4.25

jobs:
  build:
    name: Generate and validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate WIDOCO documentation
        run: |
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"
          chmod 0777 "$SITE_DIR"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            "$WIDOCO_IMAGE" \
            -ontFile "/workspace/$ONTOLOGY_FILE" \
            -outFolder "/workspace/$SITE_DIR" \
            -rewriteAll -webVowl -lang en-fr

      - name: Add the site entry point
        run: |
          cp site/index.html "$SITE_DIR/index.html"
          touch "$SITE_DIR/.nojekyll"

      - name: Generate referential dashboard
        run: |
          python3 -m pip install --quiet -r tools/validation/requirements.txt
          python3 tools/reporting/generate_dashboard.py --output "$SITE_DIR/dashboard/index.html"

      - name: Validate generated site
        shell: bash
        run: |
          set -euo pipefail
          test -f "$SITE_DIR/index.html"
          test -f "$SITE_DIR/dashboard/index.html"
          test -f "$SITE_DIR/index-en.html"
          test -f "$SITE_DIR/index-fr.html"
          test -f "$SITE_DIR/ontology.ttl"
          test -f "$SITE_DIR/ontology.owl"
          test -f "$SITE_DIR/ontology.jsonld"
          test -f "$SITE_DIR/ontology.nt"
          test -f "$SITE_DIR/webvowl/index.html"
          test -f "$SITE_DIR/webvowl/data/ontology.json"

          VERSION="$(sed -n 's/.*owl:versionInfo "\([^"]*\)".*/\1/p' "$ONTOLOGY_FILE" | head -n 1)"
          test -n "$VERSION"
          grep -Fq "$VERSION" "$SITE_DIR/index-en.html"
          python -m json.tool "$SITE_DIR/ontology.jsonld" > /dev/null
          python -m json.tool "$SITE_DIR/webvowl/data/ontology.json" > /dev/null

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
