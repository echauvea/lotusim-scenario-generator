name: HDDL planner validation

on:
  pull_request:
    paths:
      - "references/hddl/**"
      - "references/method-catalog/**"
      - "references/mission-catalog/**"
      - "references/state-model/**"
      - "references/task-catalog/**"
      - "specification/dem/**"
      - "specification/hddl/**"
      - "tools/planning/**"
      - ".github/workflows/hddl-planner.yml"
  push:
    branches: [main]
    paths:
      - "references/hddl/**"
      - "references/method-catalog/**"
      - "references/mission-catalog/**"
      - "references/state-model/**"
      - "references/task-catalog/**"
      - "specification/dem/**"
      - "specification/hddl/**"
      - "tools/planning/**"
      - ".github/workflows/hddl-planner.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  solve-mc026:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/planning/requirements-aries.txt

      - name: Install planner dependencies
        run: python -m pip install -r tools/planning/requirements-aries.txt

      - name: Test planner result export
        run: python -m unittest discover -s tools/planning/tests -v

      - name: Parse and solve MC-026
        run: python tools/planning/run_mc026_aries.py

      - name: Publish MC-026 planner result
        uses: actions/upload-artifact@v7
        with:
          name: mc-026-aries-plan
          path: outputs/mc-026/aries-plan.json
          if-no-files-found: error
          retention-days: 30
